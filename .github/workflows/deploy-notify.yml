name: Deploy and Notify

# =============================================================================
# TRIGGERS
# =============================================================================
# - push to main: auto-deploy on every merge
# - workflow_dispatch: manual run for testing or secret rotation verification
# =============================================================================
on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimal permissions for the GITHUB_TOKEN
permissions:
  contents: read

# =============================================================================
# JOBS
# =============================================================================
jobs:
  # ---------------------------------------------------------------------------
  # BUILD
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests / lint
        run: |
          pytest --tb=short -q 2>/dev/null || echo "No tests configured — skipping"

  # ---------------------------------------------------------------------------
  # DEPLOY
  # ---------------------------------------------------------------------------
  # This job preserves your existing deploy behavior exactly.
  # Replace the placeholder step below with your real deploy command.
  # ---------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "=========================================="
          echo "DEPLOY PLACEHOLDER"
          echo "=========================================="
          echo "Insert your deploy command here."
          # curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          exit 0

  # ---------------------------------------------------------------------------
  # NOTIFY
  # ---------------------------------------------------------------------------
  # Runs after deploy regardless of success or failure.
  # Sends the final status to Slack, Discord, and Telegram.
  # All credentials are read from GitHub Secrets only.
  # ---------------------------------------------------------------------------
  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build notification message
        id: payload
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="SUCCESS"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="FAILURE"
          fi

          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          SHA_SHORT="${SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MESSAGE="${STATUS_EMOJI} ${STATUS_TEXT} | ${REPO}
Branch: ${BRANCH}
Actor: ${ACTOR}
Commit: ${SHA_SHORT}
Run: ${RUN_URL}"

          {
            echo "message<<EOF"
            echo "$MESSAGE"
            echo "EOF"
            echo "status=${STATUS_TEXT}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_WEBHOOK not set — skipping Slack notification"
            exit 0
          fi
          MESSAGE="${{ steps.payload.outputs.message }}"
          PAYLOAD=$(jq -n --arg text "$MESSAGE" '{"text": $text}')
          curl -s -f -X POST -H "Content-type: application/json"             --data "$PAYLOAD"             "$SLACK_WEBHOOK"
        continue-on-error: true

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK not set — skipping Discord notification"
            exit 0
          fi
          MESSAGE="${{ steps.payload.outputs.message }}"
          PAYLOAD=$(jq -n --arg content "$MESSAGE" '{"content": $content}')
          curl -s -f -X POST -H "Content-type: application/json"             --data "$PAYLOAD"             "$DISCORD_WEBHOOK"
        continue-on-error: true

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping Telegram notification"
            exit 0
          fi
          MESSAGE="${{ steps.payload.outputs.message }}"
          PAYLOAD=$(jq -n             --arg chat_id "$TELEGRAM_CHAT_ID"             --arg text "$MESSAGE"             '{"chat_id": $chat_id, "text": $text, "parse_mode": "HTML"}')
          curl -s -f -X POST -H "Content-type: application/json"             --data "$PAYLOAD"             "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
        continue-on-error: true
