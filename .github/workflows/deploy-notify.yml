name: Deploy and Notify

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests / lint
        run: |
          pytest --tb=short -q 2>/dev/null || echo "No tests configured — skipping"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "=========================================="
          echo "DEPLOY PLACEHOLDER"
          echo "=========================================="
          echo "Insert your deploy command here."
          exit 0

  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build notification message
        id: payload
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="SUCCESS"
            COLOR="3066993"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="FAILURE"
            COLOR="15158332"
          fi

          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          SHA_SHORT="${SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MESSAGE="${STATUS_EMOJI} ${STATUS_TEXT} | ${REPO}
Branch: ${BRANCH}
Actor: ${ACTOR}
Commit: ${SHA_SHORT}
Run: ${RUN_URL}"

          {
            echo "message<<EOF"
            echo "$MESSAGE"
            echo "EOF"
            echo "status=${STATUS_TEXT}"
            echo "color=${COLOR}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then echo "SLACK_WEBHOOK not set — skipping"; exit 0; fi
          MESSAGE="${{ steps.payload.outputs.message }}"
          PAYLOAD=$(jq -n --arg text "$MESSAGE" '{"text": $text}')
          curl -s -f -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$SLACK_WEBHOOK"
        continue-on-error: true

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "DISCORD_WEBHOOK not set — skipping"; exit 0; fi
          MESSAGE="${{ steps.payload.outputs.message }}"
          COLOR="${{ steps.payload.outputs.color }}"
          PAYLOAD=$(jq -n --arg content "$MESSAGE" --argjson color "$COLOR" '{"content": $content, "embeds": [{"color": $color, "description": $content}]}')
          curl -s -f -X POST -H "Content-type: application/json" --data "$PAYLOAD" "$DISCORD_WEBHOOK"
        continue-on-error: true

      - name: Notify Telegram Primary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then echo "Telegram primary secrets not set — skipping"; exit 0; fi
          MESSAGE="${{ steps.payload.outputs.message }}"
          PAYLOAD=$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$MESSAGE" '{"chat_id": $chat_id, "text": $text, "parse_mode": "HTML"}')
          curl -s -f -X POST -H "Content-type: application/json" --data "$PAYLOAD" "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
        continue-on-error: true

      - name: Notify Telegram Secondary
        env:
          TELEGRAM_BOT_TOKEN_2: ${{ secrets.TELEGRAM_BOT_TOKEN_2 }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN_2" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then echo "Telegram secondary secrets not set — skipping"; exit 0; fi
          MESSAGE="${{ steps.payload.outputs.message }}"
          PAYLOAD=$(jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$MESSAGE" '{"chat_id": $chat_id, "text": $text, "parse_mode": "HTML"}')
          curl -s -f -X POST -H "Content-type: application/json" --data "$PAYLOAD" "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN_2}/sendMessage"
        continue-on-error: true
