name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_SERVICE_ID:-}" ]; then
            echo "RENDER_API_KEY and RENDER_SERVICE_ID must be set as repository secrets"
            exit 1
          fi

          echo "Triggering deploy for Render service: ${RENDER_SERVICE_ID}"
          resp=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')

          body=$(echo "$resp" | sed '$d')
          code=$(echo "$resp" | tail -n1)

          echo "HTTP status: $code"
          echo "Response body: $body"

          if [ "$code" != "201" ] && [ "$code" != "200" ]; then
            echo "Failed to trigger deploy"
            exit 1
          fi

          deploy_id=$(echo "$body" | jq -r .id)
          echo "Deploy triggered: $deploy_id"

          # Poll deploy status until succeeded/failed or timeout
          deadline=$((SECONDS + 600))
          while [ $SECONDS -lt $deadline ]; do
            sleep 5
            status_resp=$(curl -s -H "Authorization: Bearer ${RENDER_API_KEY}" "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}")
            status=$(echo "$status_resp" | jq -r .status)
            echo "Deploy status: $status"
            if [ "$status" = "success" ] || [ "$status" = "succeeded" ]; then
              echo "Deploy succeeded"
              exit 0
            fi
            if [ "$status" = "failed" ] || [ "$status" = "failed_build" ]; then
              echo "Deploy failed"
              echo "$status_resp"
              exit 1
            fi
          done

          echo "Timed out waiting for deploy"
          exit 1
