name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  verify-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Render autoDeploy
        run: |
          echo "✅ Render autoDeploy is enabled in render.yaml"
          echo "Service should deploy automatically on push to main"
          echo ""
          echo "If autoDeploy is not working, set up a deploy hook:"
          echo "1. Go to Render Dashboard → your service → Settings"
          echo "2. Copy the Deploy Hook URL"
          echo "3. Add it as RENDER_DEPLOY_HOOK secret in GitHub"
          echo ""
          echo "Current service: ${{ secrets.RENDER_SERVICE_ID }}"

      - name: Trigger deploy via API (fallback)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_SERVICE_ID:-}" ]; then
            echo "⚠️  RENDER_API_KEY or RENDER_SERVICE_ID not set"
            echo "Render autoDeploy should handle deployment automatically"
            exit 0
          fi

          echo "Attempting deploy trigger..."
          resp=$(curl -s -o /dev/null -w "%{http_code}" -X POST             "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys"             -H "Authorization: Bearer ${RENDER_API_KEY}"             -H "Content-Type: application/json"             -d '{}')

          if [ "$resp" = "201" ] || [ "$resp" = "200" ]; then
            echo "✅ Deploy triggered successfully"
          else
            echo "⚠️  Deploy API returned HTTP $resp (autoDeploy will still work)"
          fi
