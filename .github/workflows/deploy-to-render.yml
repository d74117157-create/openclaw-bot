name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          echo "=== Render Deploy Debug ==="
          echo "Service ID: ${RENDER_SERVICE_ID}"
          echo "API Key length: ${#RENDER_API_KEY}"

          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_SERVICE_ID:-}" ]; then
            echo "ERROR: RENDER_API_KEY and RENDER_SERVICE_ID must be set as repository secrets"
            exit 1
          fi

          # First, verify service exists
          echo "Checking service..."
          svc_resp=$(curl -s -w "\n%{http_code}"             "https://api.render.com/v1/services/${RENDER_SERVICE_ID}"             -H "Authorization: Bearer ${RENDER_API_KEY}"             -H "Accept: application/json")

          svc_body=$(echo "$svc_resp" | sed '$d')
          svc_code=$(echo "$svc_resp" | tail -n1)
          echo "Service check HTTP: $svc_code"

          if [ "$svc_code" != "200" ]; then
            echo "ERROR: Service not found or API key invalid"
            echo "Response: $svc_body"
            exit 1
          fi

          echo "Service found. Triggering deploy..."

          resp=$(curl -s -w "\n%{http_code}" -X POST             "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys"             -H "Authorization: Bearer ${RENDER_API_KEY}"             -H "Content-Type: application/json"             -d '{}')

          body=$(echo "$resp" | sed '$d')
          code=$(echo "$resp" | tail -n1)

          echo "Deploy trigger HTTP: $code"
          echo "Response: $body"

          if [ "$code" != "201" ] && [ "$code" != "200" ]; then
            echo "ERROR: Failed to trigger deploy"
            exit 1
          fi

          deploy_id=$(echo "$body" | jq -r .id)
          echo "Deploy triggered: $deploy_id"

          # Poll deploy status
          deadline=$((SECONDS + 600))
          while [ $SECONDS -lt $deadline ]; do
            sleep 5
            status_resp=$(curl -s -H "Authorization: Bearer ${RENDER_API_KEY}" "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}")
            status=$(echo "$status_resp" | jq -r .status)
            echo "Deploy status: $status"
            if [ "$status" = "live" ] || [ "$status" = "success" ] || [ "$status" = "succeeded" ]; then
              echo "✅ Deploy succeeded"
              exit 0
            fi
            if [ "$status" = "failed" ] || [ "$status" = "failed_build" ] || [ "$status" = "canceled" ]; then
              echo "❌ Deploy failed"
              echo "$status_resp"
              exit 1
            fi
          done

          echo "⏱️ Tim out waiting for deploy"
          exit 1
