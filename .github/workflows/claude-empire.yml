name: Claude Code Empire

on:
  # Trigger on push to main
  push:
    branches: [main]
  # Manual trigger
  workflow_dispatch:
  # Scheduled: runs every 6 hours
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # JOB 1: Set Render env vars and deploy
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set Render Environment Variables
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d978fh6puehc73fkq60g
        run: |
          set_env_var() {
            local key="$1"
            local value="$2"

            existing=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY"               "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars" |               jq -r ".envVars[] | select(.key == "$key") | .id")

            if [ -n "$existing" ] && [ "$existing" != "null" ]; then
              curl -s -X PUT                 -H "Authorization: Bearer $RENDER_API_KEY"                 -H "Content-Type: application/json"                 -d "{"key":"$key","value":"$value"}"                 "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/$existing"
              echo "Updated: $key"
            else
              curl -s -X POST                 -H "Authorization: Bearer $RENDER_API_KEY"                 -H "Content-Type: application/json"                 -d "{"key":"$key","value":"$value"}"                 "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars"
              echo "Created: $key"
            fi
          }

          # AI Brain
          set_env_var "GROQ_API_KEY" "${{ secrets.GROQ_API_KEY }}"
          set_env_var "OPENAI_API_KEY" "${{ secrets.OPENAI_API_KEY }}"

          # Discord
          set_env_var "DISCORD_TOKEN" "${{ secrets.DISCORD_TOKEN }}"
          set_env_var "DISCORD_GUILD_ID" "${{ secrets.DISCORD_GUILD_ID }}"
          set_env_var "DISCORD_CHANNEL_ID" "${{ secrets.DISCORD_CHANNEL_ID }}"

          # Telegram
          set_env_var "TELEGRAM_BOT1_TOKEN" "${{ secrets.TELEGRAM_BOT1_TOKEN }}"
          set_env_var "TELEGRAM_BOT2_TOKEN" "${{ secrets.TELEGRAM_BOT2_TOKEN }}"
          set_env_var "TELEGRAM_BOT3_TOKEN" "${{ secrets.TELEGRAM_BOT3_TOKEN }}"

          # Slack
          set_env_var "SLACK_BOT_TOKEN" "${{ secrets.SLACK_BOT_TOKEN }}"
          set_env_var "SLACK_APP_TOKEN" "${{ secrets.SLACK_APP_TOKEN }}"

          # Google/YouTube
          set_env_var "GOOGLE_API_KEY" "${{ secrets.GOOGLE_API_KEY }}"

          # Empire
          set_env_var "TRADING_MODE" "paper"
          set_env_var "EMPIRE_PASSWORD" "${{ secrets.EMPIRE_PASSWORD }}"

          echo "All environment variables set!"

      - name: Trigger Render Deploy
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$deploy_url" ]; then
            echo "Triggering deploy via hook..."
            curl -s "$deploy_url"
            echo "Deploy triggered!"
          else
            echo "No deploy hook URL found — skipping auto-deploy"
            echo "Set RENDER_DEPLOY_HOOK_URL secret to enable auto-deploy"
          fi

  # JOB 2: Claude Code AI Task Execution
  claude-empire-tasks:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code — Empire Tasks
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are Viktor A.I., the intelligence core of the KingLulu Digital Empire.

            Execute the following empire tasks and report results:

            1. **YouTube Content**: Plan 3 video scripts for @realhistory-lessons channel. 
               Topics: passive income, AI automation, digital empire building.
               Include hooks, key points, CTAs, and SEO tags.

            2. **Telegram Apps**: Design 3 Telegram Mini App concepts for passive income:
               - Subscription bot
               - Trading signals app  
               - Content paywall bot
               Include revenue models, tech stacks, and marketing strategies.

            3. **Chess Analytics**: Create a 30-day chess improvement plan.
               Include training platforms, opening repertoire, tactical patterns,
               time management, and how chess thinking applies to business.

            4. **Scaling Analysis**: Analyze the empire's current bottlenecks:
               - Discord bot swarm status
               - Telegram bot engagement
               - YouTube growth metrics
               - Trading P&L
               - Revenue stream diversification
               Provide a prioritized fix list.

            5. **Passive Income Research**: Find 10 genius-level passive income 
               opportunities for 2026. Focus on AI-automated, low-risk, high-scale models.
               Include startup costs, time to $1K/month, and action steps.

            6. **Marketing Blitz**: Write cross-platform marketing copy for:
               - Discord announcement
               - Telegram broadcast
               - Slack update
               Include CTAs and engagement hooks.

            Save all outputs to /tmp/empire-claude-output.json
          claude_args: |
            --model claude-sonnet-4
            --max-turns 30
            --allowedTools "Bash,Read,Edit,Write,MultiEdit"

      - name: Upload Empire Outputs
        uses: actions/upload-artifact@v4
        with:
          name: empire-claude-outputs
          path: /tmp/empire-claude-output.json
          if-no-files-found: warn

  # JOB 3: Claude Code Code Review (on PRs)
  claude-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for the KingLulu Digital Empire codebase.
            Focus on:
            - Security vulnerabilities
            - Performance bottlenecks  
            - Code quality
            - Empire scalability
            - Revenue optimization opportunities

            Provide severity ratings and actionable fixes.
          claude_args: |
            --model claude-sonnet-4
            --max-turns 15

  # JOB 4: Daily Empire Report
  daily-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Daily Empire Report
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Generate a daily empire status report including:
            - Task completion status
            - Revenue tracking progress toward $20K/month
            - Platform health (Discord, Telegram, Slack, YouTube)
            - Trading P&L summary
            - Content calendar status
            - Next 24-hour action plan

            Post this as a GitHub issue titled "Daily Empire Report — [DATE]"
          claude_args: |
            --model claude-sonnet-4
            --max-turns 20
            --allowedTools "Bash,Read,Write,mcp__github__create_issue"
