name: Claude Code Empire

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Render Environment Variables
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d978fh6puehc73fkq60g
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, os

          api_key = os.environ["RENDER_API_KEY"]
          service_id = os.environ["RENDER_SERVICE_ID"]
          headers = {"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"}

          # Get existing env vars
          req = urllib.request.Request(
              f"https://api.render.com/v1/services/{service_id}/env-vars",
              headers={"Authorization": f"Bearer {api_key}", "Accept": "application/json"}
          )

          existing = {}
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  data = json.loads(resp.read().decode())
                  for item in data.get("envVars", []):
                      existing[item["key"]] = item["id"]
          except Exception as e:
              print(f"Could not fetch existing: {e}")

          env_vars = {
              "GROQ_API_KEY": "${{ secrets.GROQ_API_KEY }}",
              "OPENAI_API_KEY": "${{ secrets.OPENAI_API_KEY }}",
              "DISCORD_TOKEN": "${{ secrets.DISCORD_TOKEN }}",
              "DISCORD_GUILD_ID": "${{ secrets.DISCORD_GUILD_ID }}",
              "DISCORD_CHANNEL_ID": "${{ secrets.DISCORD_CHANNEL_ID }}",
              "TELEGRAM_BOT1_TOKEN": "${{ secrets.TELEGRAM_BOT1_TOKEN }}",
              "TELEGRAM_BOT2_TOKEN": "${{ secrets.TELEGRAM_BOT2_TOKEN }}",
              "TELEGRAM_BOT3_TOKEN": "${{ secrets.TELEGRAM_BOT3_TOKEN }}",
              "SLACK_BOT_TOKEN": "${{ secrets.SLACK_BOT_TOKEN }}",
              "SLACK_APP_TOKEN": "${{ secrets.SLACK_APP_TOKEN }}",
              "GOOGLE_API_KEY": "${{ secrets.GOOGLE_API_KEY }}",
              "TRADING_MODE": "paper",
              "EMPIRE_PASSWORD": "${{ secrets.EMPIRE_PASSWORD }}",
          }

          for key, value in env_vars.items():
              payload = json.dumps({"key": key, "value": value}).encode()

              if key in existing:
                  env_id = existing[key]
                  req = urllib.request.Request(
                      f"https://api.render.com/v1/services/{service_id}/env-vars/{env_id}",
                      data=payload, headers=headers, method="PUT"
                  )
                  action = "Updated"
              else:
                  req = urllib.request.Request(
                      f"https://api.render.com/v1/services/{service_id}/env-vars",
                      data=payload, headers=headers, method="POST"
                  )
                  action = "Created"

              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      print(f"{action}: {key}")
              except Exception as e:
                  print(f"Failed {key}: {e}")

          print("All env vars processed!")
          PYEOF

      - name: Trigger Render Deploy
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$deploy_url" ]; then
            echo "Triggering deploy..."
            curl -s "$deploy_url"
            echo "Done!"
          else
            echo "No deploy hook URL — set RENDER_DEPLOY_HOOK_URL secret"
          fi

  claude-empire-tasks:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code — Empire Tasks
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are Viktor A.I., the intelligence core of the KingLulu Digital Empire.
            Execute these empire tasks and save results to /tmp/empire-claude-output.json:

            1. YouTube: Plan 3 video scripts for @realhistory-lessons
            2. Telegram: Design 3 Mini App concepts for passive income
            3. Chess: Create 30-day improvement plan
            4. Scaling: Analyze empire bottlenecks and fixes
            5. Income: Research 10 passive income opportunities for 2026
            6. Marketing: Write cross-platform marketing copy
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 30
            --allowedTools "Bash,Read,Edit,Write,MultiEdit"

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: empire-claude-outputs
          path: /tmp/empire-claude-output.json

  claude-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "Review this PR for security, performance, and empire scalability."
          claude_args: "--model claude-sonnet-4-20250514 --max-turns 15"

  daily-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "Generate daily empire status report and post as GitHub issue."
          claude_args: "--model claude-sonnet-4-20250514 --max-turns 20"
