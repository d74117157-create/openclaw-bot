name: Keepalive Ping
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping openclaw-bot
        run: curl -s https://openclaw-bot-fb26.onrender.com/health || true
      - name: Ping empire-tiktok-bot
        run: curl -s https://empire-tiktok-bot.onrender.com/health || true
