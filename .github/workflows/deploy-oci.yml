name: Deploy to OCI Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OCI_SSH_KEY }}

      - name: Deploy to OCI Worker
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER || 'opc' }}
        run: |
          echo "[DEPLOY] Connecting to $OCI_HOST..."
          ssh -o StrictHostKeyChecking=no $OCI_USER@$OCI_HOST << 'EOF'
            set -e
            echo "[DEPLOY] Pulling latest code..."
            cd /opt/openclaw/app
            git fetch origin main
            git reset --hard origin/main
            echo "[DEPLOY] Rebuilding container..."
            docker build -t openclaw:latest .
            echo "[DEPLOY] Restarting swarm..."
            docker stop openclaw-worker || true
            docker rm openclaw-worker || true
            docker run -d \
              --name openclaw-worker \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DISCORD_TOKEN="${DISCORD_TOKEN}" \
              -e TELEGRAM_BOT1_TOKEN="${TELEGRAM_BOT1_TOKEN}" \
              -e TELEGRAM_BOT2_TOKEN="${TELEGRAM_BOT2_TOKEN}" \
              -e TELEGRAM_BOT3_TOKEN="${TELEGRAM_BOT3_TOKEN}" \
              -e SLACK_BOT_TOKEN="${SLACK_BOT_TOKEN}" \
              -e SLACK_APP_TOKEN="${SLACK_APP_TOKEN}" \
              -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
              -e TRADING_MODE="${TRADING_MODE:-paper}" \
              -e BINANCE_API_KEY="${BINANCE_API_KEY}" \
              -e BINANCE_API_SECRET="${BINANCE_API_SECRET}" \
              openclaw:latest
            echo "[DEPLOY] ✅ OpenClaw worker redeployed on OCI"
          EOF
