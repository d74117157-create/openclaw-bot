name: OpenClaw Empire — Test & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Syntax check — Empire code only
        run: python -m compileall app/ -f

      - name: Import validation
        run: |
          python -c "from app.core.config import settings; print('Config OK')"
          python -c "from app.database.models import init_database; print('Database OK')"
          python -c "from app.brain.ai_client import AIBrain; print('AI Brain OK')"
          python -c "from app.agents.orchestrator import OrchestratorAgent; print('Orchestrator OK')"

      - name: Environment validation
        run: |
          python -c "
          from app.core.config import settings
          v = settings.validate()
          print('AI Providers:', v['ai_providers'])
          print('Platforms:', v['platforms'])
          print('Missing:', v['missing'])
          "

      - name: Database test
        env:
          DATABASE_URL: sqlite:///./test_empire.db
        run: |
          python -c "
          from app.database.models import init_database, SessionLocal, Task
          init_database()
          db = SessionLocal()
          t = Task(task_id='test_001', goal='Test task', agent='test')
          db.add(t)
          db.commit()
          result = db.query(Task).filter(Task.task_id == 'test_001').first()
          assert result is not None
          assert result.goal == 'Test task'
          print('Database read/write: PASS')
          db.close()
          import os
          os.remove('./test_empire.db')
          "

      - name: Startup test
        env:
          DATABASE_URL: sqlite:///./test_empire.db
          PORT: "8080"
        run: |
          python app/main.py &
          sleep 5
          curl -s http://localhost:8080/health | grep -q "healthy" && echo "Health check: PASS" || echo "Health check: FAIL"
          curl -s http://localhost:8080/ready | grep -q "ready" && echo "Ready check: PASS" || echo "Ready check: FAIL"
          pkill -f "python app/main.py" || true
          rm -f ./test_empire.db
