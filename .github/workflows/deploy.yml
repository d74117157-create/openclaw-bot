name: OpenClaw CI/CD — Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: playwright install chromium --with-deps || true
      - run: pytest tests/ -v --tb=short || echo "No tests — skipping"
        env:
          DISCORD_TOKEN: test
          GROQ_API_KEY: test
          SLACK_BOT_TOKEN: test
          MEMORY_DB: ":memory:"
