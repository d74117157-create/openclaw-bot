name: Deploy to Oracle VM (Primary)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  OCI_VM_HOST: ${{ secrets.OCI_VM_HOST }}
  OCI_VM_USER: ${{ secrets.OCI_VM_USER }}
  OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}

jobs:
  deploy-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$OCI_SSH_KEY" > ~/.ssh/oci_vm_key
          chmod 600 ~/.ssh/oci_vm_key
          cat >> ~/.ssh/config <<EOF
          Host oci-vm
            HostName $OCI_VM_HOST
            User $OCI_VM_USER
            IdentityFile ~/.ssh/oci_vm_key
            StrictHostKeyChecking no
          EOF
      - name: Deploy to Oracle VM
        run: |
          ssh oci-vm << 'REMOTE'
            set -e
            cd ~/openclaw-superswarm || git clone https://github.com/${{ github.repository }}.git ~/openclaw-superswarm
            cd ~/openclaw-superswarm
            git pull origin main
            cat > .env <<ENV
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          TELEGRAM_BOT1_TOKEN=${{ secrets.TELEGRAM_BOT1_TOKEN }}
          TELEGRAM_BOT2_TOKEN=${{ secrets.TELEGRAM_BOT2_TOKEN }}
          TELEGRAM_BOT3_TOKEN=${{ secrets.TELEGRAM_BOT3_TOKEN }}
          SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN=${{ secrets.SLACK_APP_TOKEN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          APP_HOST=0.0.0.0
          APP_PORT=8000
          ENVIRONMENT=production
          SWARM_MODE=auto-reconnect
          ENV
            docker compose down || true
            docker compose up -d --build
            sleep 15
            curl -sf http://localhost:8000/health || exit 1
            echo "✅ Oracle VM deployment successful"
          REMOTE
      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/oci_vm_key

  deploy-render:
    runs-on: ubuntu-latest
    needs: deploy-oracle
    if: failure()
    steps:
      - name: Trigger Render Fallback
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys"             -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"             -H "Content-Type: application/json" -d '{"clearCache": true}' || true
          echo "⚠️ Oracle deploy failed — Render fallback triggered."
