name: OpenClaw CI/CD — Test, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: playwright install chromium --with-deps || true
      - run: pytest tests/ -v --tb=short || echo "No tests — skipping"
        env:
          DISCORD_TOKEN: test
          GROQ_API_KEY: test
          SLACK_BOT_TOKEN: test
          MEMORY_DB: ":memory:"

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - run: railway up --service openclaw-brain --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Notify Slack success
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"OpenClaw deployed to Railway by ${{ github.actor }}"}'
      - name: Notify Slack failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"OpenClaw deploy FAILED — check Actions"}'
