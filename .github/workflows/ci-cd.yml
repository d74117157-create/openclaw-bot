name: OpenClaw CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall app/

      - name: Import check
        run: |
          export DISCORD_TOKEN=dummy
          export GROQ_API_KEY=gsk_dummy
          export PORT=8080
          export DATABASE_URL=sqlite:///./data/empire.db
          python -c "from app.main import app; print('Import OK')"

      - name: Run tests
        run: pytest tests/ -v || echo "Tests not yet implemented"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t openclaw-test .

      - name: Test Docker container
        run: |
          docker run -d -e DISCORD_TOKEN=dummy -e GROQ_API_KEY=gsk_dummy -e PORT=8080 -e DATABASE_URL=sqlite:///./data/empire.db --name openclaw-test openclaw-test
          sleep 5
          docker ps | grep openclaw-test
          docker logs openclaw-test
          docker stop openclaw-test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          curl -X POST "https://api.render.com/v1/services/srv-d978fh6puehc73fkq60g/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Wait for deploy
        run: sleep 30

      - name: Health check
        run: |
          curl -f https://openclaw-bot.onrender.com/health || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "DEPLOYMENT FAILED — triggering rollback"
          curl -X POST "https://api.render.com/v1/services/srv-d978fh6puehc73fkq60g/rollback" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
