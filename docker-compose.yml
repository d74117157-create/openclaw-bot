version: "3.8"
services:
  app:
    build: .
    container_name: openclaw-superswarm
    restart: always
    ports: ["8000:8000"]
    env_file: [".env"]
    depends_on: [redis, db]
    volumes: ["./logs:/app/logs", "./data:/app/data"]
    networks: [openclaw-net]
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: always
    volumes: [redis_data:/data]
    networks: [openclaw-net]
  db:
    image: postgres:16-alpine
    container_name: openclaw-db
    restart: always
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw_secret
      POSTGRES_DB: openclaw
    volumes: [pg_data:/var/lib/postgresql/data]
    networks: [openclaw-net]
  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: always
    ports: ["80:80", "443:443"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [app]
    networks: [openclaw-net]
volumes:
  redis_data:
  pg_data:
networks:
  openclaw-net: {driver: bridge}
