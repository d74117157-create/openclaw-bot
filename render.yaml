services:
  - type: worker
    name: openclaw-bot
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: OWNER_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true
