services:
  - type: web
    name: openclaw-empire
    runtime: python
    plan: standard
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PORT
        value: "8080"
      - key: PYTHONPATH
        value: "."
      - key: DATABASE_URL
        value: "sqlite:///./data/empire.db"
      - key: LOG_LEVEL
        value: "INFO"
      # Secrets (set in Render dashboard, never commit values)
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: TELEGRAM_BOT1_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
    disk:
      name: empire-data
      mountPath: /app/data
      sizeGB: 1
