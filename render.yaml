services:
  - type: web
    name: openclaw-elite
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: OWNER_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: PRIMARY_LLM
        value: groq
      - key: TELEGRAM_BOT1_TOKEN
        sync: false
      - key: TELEGRAM_BOT2_TOKEN
        sync: false
      - key: TELEGRAM_BOT3_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SLACK_CHANNEL
        value: openclaw-ops
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: d74117157-create/openclaw-bot
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MEMORY_DB
        value: /app/data/openclaw_memory.db
      - key: MONITOR_URLS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: openclaw-data
      mountPath: /app/data
      sizeGB: 1
    autoDeploy: true
