services:
  - type: worker
    name: openclaw-bot
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: OWNER_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SLACK_CHANNEL
        value: openclaw-ops
      - key: GITHUB_TOKEN
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MEMORY_DB
        value: /app/data/openclaw_memory.db
    disk:
      name: openclaw-data
      mountPath: /app/data
      sizeGB: 1
    autoDeploy: true
