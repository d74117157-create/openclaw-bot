services:
  - type: web
    name: openclaw-superswarm
    runtime: docker
    plan: standard
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: TELEGRAM_BOT1_TOKEN
        sync: false
      - key: TELEGRAM_BOT2_TOKEN
        sync: false
      - key: TELEGRAM_BOT3_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: REDIS_URL
        value: redis://redis:6379/0
      - key: DATABASE_URL
        value: postgresql://openclaw:openclaw_secret@db:5432/openclaw
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: SWARM_MODE
        value: auto-reconnect
    healthCheckPath: /health
