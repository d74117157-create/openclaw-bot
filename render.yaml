services:
  - type: web
    name: openclaw-empire
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: TELEGRAM_BOT1_TOKEN
        sync: false
      - key: TELEGRAM_BOT2_TOKEN
        sync: false
      - key: TELEGRAM_BOT3_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
