services:
  - type: web
    name: openclaw-superswarm
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: TELEGRAM_BOT1_TOKEN
        sync: false
      - key: TELEGRAM_BOT2_TOKEN
        sync: false
      - key: TELEGRAM_BOT3_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: DATABASE_URL
        value: postgresql://openclaw:openclaw_secret@localhost:5432/openclaw
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 10000
      - key: ENVIRONMENT
        value: production
      - key: SWARM_MODE
        value: auto-reconnect
    healthCheckPath: /health
